<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Study Zone - Learning Hub</title>
  <style>
    :root {
      --primary: #4a90e2;
      --success: #2ecc71;
      --warning: #e67e22;
      --dark: #2c3e50;
      --light: #f8fafc;
      --border: #cbd5e1;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f1f5f9;
      color: var(--dark);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 800px;
      margin: 30px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .hidden { display: none !important; }
    
    /* Form & UI Styling */
    h2, h3 { color: var(--primary); margin-top: 0; }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0 16px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 15px;
    }
    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px 20px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s;
    }
    button:hover { background-color: #357abd; }
    
    /* Layout Blocks */
    .task-card {
      background: var(--light);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .passage-box {
      background: #fff8f0;
      border-left: 4px solid var(--warning);
      padding: 20px;
      border-radius: 4px;
      margin-bottom: 25px;
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-line;
    }
    .question-block {
      background: var(--light);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid var(--border);
    }
    
    /* Choice Option Elements */
    .options-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .option-label {
      background: white;
      border: 1px solid var(--border);
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      transition: background 0.15s;
    }
    .option-label:hover { background: #eef2f7; }
    .option-label input { width: auto; margin: 0; }
    
    /* Security Rules */
    .secure-input {
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- FEATURE 1: SECURE AUTHENTICATION SYSTEM -->
  <div id="auth-view">
    <h2>Welcome to The Study Zone Hub</h2>
    <div id="login-form">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="student@thestudyzone.ca">
      <label>Password</label>
      <input type="password" id="login-pass">
      <button onclick="handleLogin()">Sign In 🔐</button>
    </div>
  </div>

  <!-- FEATURE 2: CENTRAL ASSIGNMENT DASHBOARD -->
  <div id="dashboard-view" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h3>Hello, <span id="user-display-name">Student</span>!</h3>
      <button onclick="logout()" style="background: #e11d48; padding: 6px 12px; font-size: 13px;">Logout</button>
    </div>
    <p>Select an active curriculum module below to begin your work:</p>
    <div id="tasks-list-container"></div>
  </div>

  <!-- FEATURE 3: ACTIVE WORKSHEET INTERFACE -->
  <div id="workspace-view" class="hidden">
    <button onclick="backToDashboard()" style="background: #64748b; margin-bottom: 15px;">← Back to Portal</button>
    <h2 id="workspace-title">Loading Lesson...</h2>
    <div id="workspace-content" class="passage-box"></div>
    
    <form id="assignment-form" onsubmit="handleAssignmentSubmission(event)">
      <div id="questions-container"></div>
      <button type="submit" style="background-color: var(--success); width: 100%; margin-top: 15px;">Submit Completed Work 🚀</button>
    </form>
  </div>
</div>

<script>
  // PASTE YOUR DEPLOYED GOOGLE APPS SCRIPT WEB APP URL HERE:
  const BACKEND_API_URL = "https://script.google.com/macros/s/AKfycbyi2N7L32KgAFW4CKq6AR05Ewcc-kgcUY315LCh38fOE19btr2z_phA-ccH9gC8KVGF/exec";

  let currentUser = { name: "", email: "", grade: "" };
  let currentActiveTask = null;
  let currentUtterance = null; // Stores global reference to prevent audio memory collection tags

  // --- FEATURE 4: NATIVE ADAPTIVE SPEECH SYNTHESIS ENGINE ---
  function speakAudio(textToSpeak) {
    if (!('speechSynthesis' in window)) return;
    
    // Clear out any stale speaking queues instantly
    window.speechSynthesis.cancel();
    if (!textToSpeak || textToSpeak.trim() === "") return;
    
    currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
    currentUtterance.rate = 0.9; // Adjusted pace for cognitive processing ease
    currentUtterance.lang = 'en-US';
    
    window.speechSynthesis.speak(currentUtterance);
  }

  // Intercept entries within the workspace to handle real-time letter/word phonetic isolation
  document.addEventListener("keyup", function(event) {
    if (!event.target.classList.contains("speech-input")) return;
    
    const valueStr = event.target.value;
    
    // Rule: Space Bar trigger isolates and speaks the full string word
    if (event.key === " " || event.keyCode === 32) {
      const words = valueStr.trim().split(/\s+/);
      const lastWord = words[words.length - 1];
      if (lastWord) {
        speakAudio(lastWord);
      }
    } else {
      // Rule: Standard typing isolates and reads exclusively the single last string letter character
      const lastChar = valueStr.slice(-1);
      if (lastChar && lastChar.match(/[a-zA-Z0-9]/)) {
        speakAudio(lastChar);
      }
    }
  });

  // --- CORE SYSTEM WEB INFRASTRUCTURE WORKFLOWS ---
  function handleLogin() {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-pass").value.trim();
    
    if(!email || !password) { alert("Please complete all credential fields."); return; }
    
    fetch(BACKEND_API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "login", email: email, password: password })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success) {
        currentUser = { name: data.name, email: data.email, grade: data.grade };
        document.getElementById("user-display-name").innerText = currentUser.name;
        showView("dashboard-view");
        loadAvailableTasks();
      } else {
        alert(data.message);
      }
    });
  }

  function loadAvailableTasks() {
    const container = document.getElementById("tasks-list-container");
    container.innerHTML = "<p>Retrieving structured course elements...</p>";
    
    fetch(BACKEND_API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "getTasks", email: currentUser.email, grade: currentUser.grade })
    })
    .then(res => res.json())
    .then(tasks => {
      container.innerHTML = "";
      if(tasks.length === 0) {
        container.innerHTML = "<p>🎉 Excellent! No pending assignments remaining for your profile tracking profile.</p>";
        return;
      }
      tasks.forEach(task => {
        const card = document.createElement("div");
        card.className = "task-card";
        card.innerHTML = `
          <div><strong>${task.title}</strong><br><small style="color:#64748b;">ID: ${task.id}</small></div>
          <button onclick='launchWorkspace(${JSON.stringify(task).replace(/'/g, "&apos;")})'>Open Lesson</button>
        `;
        container.appendChild(card);
      });
    });
  }

  // --- FEATURE 5: INTERACTIVE PARSING & RENDER LAYOUT SYSTEM ---
  function launchWorkspace(taskObject) {
    currentActiveTask = taskObject;
    document.getElementById("workspace-title").innerText = taskObject.title;
    document.getElementById("workspace-content").innerText = taskObject.content;
    
    const container = document.getElementById("questions-container");
    container.innerHTML = "";
    
    // Breakapart individual elements generated via storage tokens
    const questionsArray = taskObject.questionsRaw.split("||");
    
    questionsArray.forEach((qText, index) => {
      const block = document.createElement("div");
      block.className = "question-block";
      
      const cleanLabel = qText.replace(/•\s*/, "").trim();
      const isMCQ = cleanLabel.includes("[MCQ]");
      const isTF = cleanLabel.includes("[TF]");
      const isFill = cleanLabel.includes("[FILL]");
      
      // Secondary block extraction rules identifying explicit bracketed choices
      let textWithoutOptions = cleanLabel;
      let optionElements = [];
      const optionMatch = cleanLabel.match(/\(([^)]+)\)$/);
      
      if (optionMatch) {
        textWithoutOptions = cleanLabel.substring(0, optionMatch.index).trim();
        optionElements = optionMatch[1].split(",").map(opt => opt.trim());
      }
      
      const heading = document.createElement("p");
      heading.style.fontWeight = "bold";
      heading.innerText = textWithoutOptions;
      block.appendChild(heading);
      
      // Dynamic Interface Component Router
      if (isMCQ) {
        const group = document.createElement("div");
        group.className = "options-group";
        optionElements.forEach(option => {
          const lbl = document.createElement("label");
          lbl.className = "option-label";
          lbl.innerHTML = `<input type="radio" name="q_${index}" value="${option}" required> ${option}`;
          group.appendChild(lbl);
        });
        block.appendChild(group);
        
      } else if (isTF) {
        // AUTOMATIC TRUE/FALSE RADIO BUTTON RENDER INSTEAD OF TEXT ENTRY
        const group = document.createElement("div");
        group.className = "options-group";
        const tfOptions = ["True", "False"];
        
        tfOptions.forEach(option => {
          const lbl = document.createElement("label");
          lbl.className = "option-label";
          lbl.innerHTML = `<input type="radio" name="q_${index}" value="${option}" required> ${option}`;
          group.appendChild(lbl);
        });
        block.appendChild(group);
        
      } else if (isFill) {
        const input = document.createElement("input");
        input.type = "text";
        input.name = `q_${index}`;
        input.placeholder = "Type your missing word response element here...";
        input.className = "speech-input secure-input";
        input.required = true;
        block.appendChild(input);
        
      } else {
        // Fallback catch handles open-ended reflective long entries cleanly
        const textarea = document.createElement("textarea");
        textarea.name = `q_${index}`;
        textarea.rows = 3;
        textarea.placeholder = "Write your complete analysis details here...";
        textarea.className = "speech-input secure-input";
        textarea.required = true;
        
        // Anti-Copy Assistance Enforcement Boundary
        textarea.onpaste = function(e) { e.preventDefault(); alert("Direct paste tools are restricted for assessment validation rules."); };
        block.appendChild(textarea);
      }
      
      container.appendChild(block);
    });
    
    showView("workspace-view");
  }

  function handleAssignmentSubmission(event) {
    event.preventDefault();
    const form = document.getElementById("assignment-form");
    const formData = new FormData(form);
    const answersCollector = [];
    
    const questionsArray = currentActiveTask.questionsRaw.split("||");
    
    questionsArray.forEach((_, index) => {
      const radioCheck = form.querySelector(`input[name="q_${index}"]:checked`);
      if (radioCheck) {
        answersCollector.push(radioCheck.value);
      } else {
        const textValue = form.querySelector(`[name="q_${index}"]`)?.value || "";
        answersCollector.push(textValue.trim());
      }
    });
    
    fetch(BACKEND_API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "submit",
        email: currentUser.email,
        taskId: currentActiveTask.id,
        studentAnswers: answersCollector
      })
    })
    .then(res => res.json())
    .then(result => {
      if(result.success) {
        alert(`Evaluation Complete!\nResult Standard: ${result.status}\nHub Feedback: ${result.feedback}`);
        showView("dashboard-view");
        loadAvailableTasks();
      } else {
        alert("Submission failed: " + result.message);
      }
    });
  }

  // --- APPLICATION ROUTING SWITCHES ---
  function showView(viewId) {
    document.getElementById("auth-view").classList.add("hidden");
    document.getElementById("dashboard-view").classList.add("hidden");
    document.getElementById("workspace-view").classList.add("hidden");
    document.getElementById(viewId).classList.remove("hidden");
  }
  function backToDashboard() { showView("dashboard-view"); }
  function logout() { currentUser = { name: "", email: "", grade: "" }; showView("auth-view"); }
</script>

</body>
</html>
